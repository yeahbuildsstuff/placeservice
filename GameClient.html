<script>
(function(){

  // Create the full-screen overlay
  const overlay = document.createElement("div");
  overlay.style.cssText = `
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: #c2d6f0;
    z-index: 999999999;
    cursor: default;
  `;
  document.body.appendChild(overlay);

  function startServer() {

    overlay.remove();
    window.removeEventListener("mousemove", startServer);
    window.removeEventListener("click", startServer);

    // Open popup
    window.serverWin = window.open(
      "about:blank",
      "LocalServer",
      "popup=yes,toolbar=no,menubar=no,location=yes,status=no,scrollbars=no,resizable=no,width=800,height=600"
    );

    // Force popup to lose focus (go behind main window)
    window.focus();

    if (!window.serverWin) {
   
      return;
    }

    // Fill popup
    window.serverWin.document.write(`
      <!DOCTYPE html>
      <html>
      <head>
        <title>LocalServer</title>
        <style>
          html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #a9c3e4;
            overflow: hidden;
          }
        </style>
      </head>
      <body></body>
      </html>
    `);
    window.serverWin.document.close();

    // Close main window if popup closes
    const interval = setInterval(() => {
      if (window.serverWin.closed) {
        clearInterval(interval);
        window.close();
      }
    }, 300);
  }

  // Trigger on mouse movement OR click
  window.addEventListener("mousemove", startServer);
  window.addEventListener("click", startServer);

})();
</script>

// ------------------------------
// SIMPLE OBJ PARSER (no plugins)
// ------------------------------
function parseOBJ(objText) {
    const positions = [];
    const normals = [];
    const uvs = [];

    const finalPositions = [];
    const finalNormals = [];
    const finalUVs = [];
    const indices = [];

    const lines = objText.split("\n");

    for (let line of lines) {
        line = line.trim();
        if (line.startsWith("v ")) {
            const [, x, y, z] = line.split(/\s+/);
            positions.push([parseFloat(x), parseFloat(y), parseFloat(z)]);
        } 
        else if (line.startsWith("vt ")) {
            const [, u, v] = line.split(/\s+/);
            uvs.push([parseFloat(u), 1 - parseFloat(v)]);
        } 
        else if (line.startsWith("vn ")) {
            const [, x, y, z] = line.split(/\s+/);
            normals.push([parseFloat(x), parseFloat(y), parseFloat(z)]);
        } 
        else if (line.startsWith("f ")) {
            const [, ...verts] = line.split(/\s+/);

            // Triangulate quads
            const tri = verts.length === 4
                ? [verts[0], verts[1], verts[2], verts[0], verts[2], verts[3]]
                : verts;

            for (let v of tri) {
                const [vi, ti, ni] = v.split("/").map(n => n ? parseInt(n) - 1 : null);

                const pos = positions[vi];
                finalPositions.push(pos[0], pos[1], pos[2]);

                if (ti !== null && uvs[ti]) {
                    finalUVs.push(uvs[ti][0], uvs[ti][1]);
                } else {
                    finalUVs.push(0, 0);
                }

                if (ni !== null && normals[ni]) {
                    finalNormals.push(normals[ni][0], normals[ni][1], normals[ni][2]);
                } else {
                    finalNormals.push(0, 1, 0);
                }

                indices.push(indices.length);
            }
        }
    }

    return {
        positions: finalPositions,
        normals: finalNormals,
        uvs: finalUVs,
        indices: indices
    };
}



// ------------------------------
// MSH LOADER
// ------------------------------
async function loadMSH(url, scene) {
    const text = await (await fetch(url)).text();
    const lines = text.split("\n");

    const base64 = lines[1].trim(); // second line
    const objData = lines.slice(3).join("\n"); // everything after !objdata

    const parsed = parseOBJ(objData);

    const mesh = new BABYLON.Mesh("hat", scene);

    const vertexData = new BABYLON.VertexData();
    vertexData.positions = parsed.positions;
    vertexData.normals = parsed.normals;
    vertexData.uvs = parsed.uvs;
    vertexData.indices = parsed.indices;
    vertexData.applyToMesh(mesh);

    const mat = new BABYLON.StandardMaterial("hatMat", scene);
    mat.diffuseTexture = new BABYLON.Texture(
        "data:image/png;base64," + base64,
        scene,
        true,
        false,
        BABYLON.Texture.NEAREST_SAMPLINGMODE
    );
    mat.backFaceCulling = false;
mat.specularColor = new BABYLON.Color3(1,1,1);
mat.specularPower = 10;


    mesh.material = mat;

    return mesh;
}

async function equipHat(model, scene) {
   const url = hatMeshPath;

    const hat = await loadMSH(url, scene);

    // Parent the hat to the model
    hat.parent = model;

    // Make sure it uses quaternion rotation
    hat.rotationQuaternion = new BABYLON.Quaternion();

    // Local offset (inside the model)
    hat.position = new BABYLON.Vector3(0, 3.5, 0);

    // Rotate 180 degrees on Y axis (local rotation)
    hat.rotation = new BABYLON.Vector3(0, Math.PI, 0);

    return hat;
}

function parseHelpFormat(raw) {
  const lines = raw.split("\n");
  const html = [];
  for (let line of lines) {
    line = line.trim();
    if (!line) continue;
    if (line.startsWith("<line.empty>")) {
      html.push("<div style='height:10px'></div>");
      continue;
    }
    if (line.startsWith("<line.new>")) {
      const match = line.match(/<line\.new>\s*"([^"]+)",([^,]+),([^,]+),(.+)/);
      if (match) {
        const text = match[1];
        const weight = match[2];
        const size = match[3];
        const font = match[4];
        html.push(`
          <div style="
            font-family:${font};
            font-size:${size}px;
            font-weight:${weight === 'Bold' ? 'bold' : 'normal'};
            margin-bottom:6px;
          ">
            ${text}
          </div>
        `);
      }
    }
  }
  return html.join("");
}

function extractUrlAttr(attr) {
  if (!attr) return null;
  const m = attr.match(/url\(["']?(.*?)["']?\)/i);
  return m ? m[1] : attr;
}

function getFaceNormal(face) {
  switch ((face || "").toLowerCase()) {
    case "top": return new BABYLON.Vector3(0, 1, 0);
    case "bottom": return new BABYLON.Vector3(0, -1, 0);
    case "front": return new BABYLON.Vector3(0, 0, -1);
    case "back": return new BABYLON.Vector3(0, 0, 1);
    case "left": return new BABYLON.Vector3(-1, 0, 0);
    case "right": return new BABYLON.Vector3(1, 0, 0);
    default: return new BABYLON.Vector3(0, 1, 0);
  }
}

function getFaceSize(mesh, face) {
  const bbox = mesh.getBoundingInfo().boundingBox;
  const ext = bbox.extendSizeWorld;
  switch ((face || "").toLowerCase()) {
    case "top":
    case "bottom":
      return new BABYLON.Vector2(ext.x * 2, ext.z * 2);
    case "front":
    case "back":
      return new BABYLON.Vector2(ext.x * 2, ext.y * 2);
    case "left":
    case "right":
      return new BABYLON.Vector2(ext.z * 2, ext.y * 2);
    default:
      return new BABYLON.Vector2(ext.x * 2, ext.z * 2);
  }
}

function getFacePosition(mesh, face) {
  const bbox = mesh.getBoundingInfo().boundingBox;
  const center = bbox.centerWorld;
  const extents = bbox.extendSizeWorld;
  const n = getFaceNormal(face);
  return new BABYLON.Vector3(
    center.x + n.x * extents.x + n.x * 0.01,
    center.y + n.y * extents.y + n.y * 0.01,
    center.z + n.z * extents.z + n.z * 0.01
  );
}

function getFaceRotation(face) {
  switch ((face || "").toLowerCase()) {
    case "top":    return new BABYLON.Vector3(Math.PI / 2, 0, 0);
    case "bottom": return new BABYLON.Vector3(-Math.PI / 2, 0, 0);
    case "front":  return new BABYLON.Vector3(0, 0, 0);
    case "back":   return new BABYLON.Vector3(0, Math.PI, 0);
    case "left":   return new BABYLON.Vector3(0, -Math.PI / 2, 0);
    case "right":  return new BABYLON.Vector3(0, Math.PI / 2, 0);
    default:       return new BABYLON.Vector3(0, 0, 0);
  }
}

function createFacePlane(target, face, scene) {
  const size2D = getFaceSize(target, face);
  const plane = BABYLON.MeshBuilder.CreatePlane("facePlane", {
    width: size2D.x,
    height: size2D.y
  }, scene);
  plane.position = getFacePosition(target, face);
  plane.rotation = getFaceRotation(face);
  plane.parent = target;
  plane.isPickable = false;
  return plane;
}

const luaVMs = [];

function createLuaVM(code) {
  const lines = code.split("\n").map(l => l.trim());
  return {
    lines,
    pc: 0,
    waitTime: 0,
    loopStack: [],
    done: false
  };
}

function stepLuaVM(vm, dt) {
  if (vm.done) return;
  if (vm.waitTime > 0) {
    vm.waitTime -= dt;
    if (vm.waitTime > 0) return;
  }
  while (vm.pc < vm.lines.length) {
    let line = vm.lines[vm.pc].trim();
    if (!line || line.startsWith("--")) {
      vm.pc++;
      continue;
    }
    if (/^while\s+true\s+do/.test(line)) {
      vm.loopStack.push({ type: "while", startPc: vm.pc + 1 });
      vm.pc++;
      continue;
    }
    let forMatch = line.match(/^for\s+([a-zA-Z_]\w*)\s*=\s*(\d+)\s*,\s*(\d+)\s*do/);
    if (forMatch) {
      const varName = forMatch[1];
      const start = parseInt(forMatch[2], 10);
      const end = parseInt(forMatch[3], 10);
      vm.loopStack.push({
        type: "for",
        varName,
        current: start,
        end,
        startPc: vm.pc + 1
      });
      vm[varName] = start;
      vm.pc++;
      continue;
    }
    if (line === "end") {
      const frame = vm.loopStack.pop();
      if (!frame) {
        vm.pc++;
        continue;
      }
      if (frame.type === "while") {
        vm.loopStack.push(frame);
        vm.pc = frame.startPc;
        continue;
      } else if (frame.type === "for") {
        frame.current++;
        if (frame.current <= frame.end) {
          vm.loopStack.push(frame);
          vm[frame.varName] = frame.current;
          vm.pc = frame.startPc;
          continue;
        } else {
          vm.pc++;
          continue;
        }
      }
    }
    let waitMatch = line.match(/^wait\(\s*([\d.]+)\s*\)/);
    if (waitMatch) {
      const seconds = parseFloat(waitMatch[1]);
      vm.waitTime = seconds;
      vm.pc++;
      return;
    }
    let assignMatch = line.match(/^([A-Za-z_]\w*)\.(p[xyz]|s[xyz])\s*=\s*([A-Za-z_]\w*)\.(p[xyz]|s[xyz])\s*([\+\-])\s*([\d.]+)/);
    if (assignMatch) {
      const partNameL = assignMatch[1];
      const propL = assignMatch[2];
      const partNameR = assignMatch[3];
      const propR = assignMatch[4];
      const op = assignMatch[5];
      const val = parseFloat(assignMatch[6]);
      const partL = window.namedParts[partNameL];
      const partR = window.namedParts[partNameR];
      if (partL && partR) {
        function getProp(part, prop) {
          if (prop === "px") return part.position.x;
          if (prop === "py") return part.position.y;
          if (prop === "pz") return part.position.z;
          if (prop === "sx") return part.scaling.x;
          if (prop === "sy") return part.scaling.y;
          if (prop === "sz") return part.scaling.z;
          return 0;
        }
        function setProp(part, prop, v) {
          if (prop === "px") part.position.x = v;
          if (prop === "py") part.position.y = v;
          if (prop === "pz") part.position.z = v;
          if (prop === "sx") part.scaling.x = v;
          if (prop === "sy") part.scaling.y = v;
          if (prop === "sz") part.scaling.z = v;

          // IMPORTANT: do NOT constantly overwrite physics body from mesh
          // Only do this if you intend to teleport:
          if (part.physicsBody && (prop === "px" || prop === "py" || prop === "pz")) {
            part.physicsBody.position.set(part.position.x, part.position.y, part.position.z);
            part.physicsBody.velocity.set(0,0,0);
          }
        }
        let base = getProp(partR, propR);
        let result = op === "+" ? base + val : base - val;
        setProp(partL, propL, result);
      }
      vm.pc++;
      continue;
    }
    let assignSimple = line.match(/^([A-Za-z_]\w*)\.(p[xyz]|s[xyz])\s*=\s*([\d.]+)/);
    if (assignSimple) {
      const partName = assignSimple[1];
      const prop = assignSimple[2];
      const val = parseFloat(assignSimple[3]);
      const part = window.namedParts[partName];
      if (part) {
        if (prop === "px") part.position.x = val;
        if (prop === "py") part.position.y = val;
        if (prop === "pz") part.position.z = val;
        if (prop === "sx") part.scaling.x = val;
        if (prop === "sy") part.scaling.y = val;
        if (prop === "sz") part.scaling.z = val;

        if (part.physicsBody && (prop === "px" || prop === "py" || prop === "pz")) {
          part.physicsBody.position.set(part.position.x, part.position.y, part.position.z);
          part.physicsBody.velocity.set(0,0,0);
        }
      }
      vm.pc++;
      continue;
    }
    vm.pc++;
  }
  if (vm.pc >= vm.lines.length && vm.loopStack.length === 0) {
    vm.done = true;
  }
}

//bookmark thing
function startLuaScheduler() {
  const interval = 50;
  setInterval(() => {
    const dt = interval / 1000;
    for (const vm of luaVMs) {
      stepLuaVM(vm, dt);
    }
  }, interval);
}

} else if (shape === "Cylinder") {

    tex.hasAlpha = true;

    mat.backFaceCulling = false;
    mat.zOffset = -2;
    mat.alpha = 1 - transparency;
    mat.specularColor = new BABYLON.Color3(0.9,0.9,0.9);

// ---- LOAD WELDS ----

    const w = weldNodes[i];

    const part0Name = w.getAttribute("part0");
    const part1Name = w.getAttribute("part1");

    const mesh0 = window.namedParts[part0Name];
    const mesh1 = window.namedParts[part1Name];

    if (!mesh0 || !mesh1) continue;
    if (!mesh0.physicsBody || !mesh1.physicsBody) continue;

    const body0 = mesh0.physicsBody;
    const body1 = mesh1.physicsBody;

    // Roblox behavior: if either is anchored, both become anchored
    if (body0.mass === 0 || body1.mass === 0) {
        body0.mass = 0;
        body1.mass = 0;
        body0.type = CANNON.Body.STATIC;
        body1.type = CANNON.Body.STATIC;
        body0.updateMassProperties();
        body1.updateMassProperties();
    }

    // Create the weld (rigid lock)
    const weld = new CANNON.LockConstraint(body0, body1);
    world.addConstraint(weld);
}



  const luaNodes = xml.getElementsByTagName("luascript");
  for (let i = 0; i < luaNodes.length; i++) {
    const node = luaNodes[i];
    const code = node.textContent || "";
    const vm = createLuaVM(code);
    luaVMs.push(vm);
  }

  if (luaVMs.length > 0) startLuaScheduler();
}

// ---------------- RENDER LOOP WITH PHYSICS STEP ----------------

function startRenderLoop(scene) {
  const fixedTimeStep = 1 / 30;
  const maxSubSteps = 3;

  engine.runRenderLoop(() => {
    const dt = engine.getDeltaTime() / 1000;

    world.step(fixedTimeStep, dt, maxSubSteps);

    for (const name in window.namedParts) {
      const mesh = window.namedParts[name];
      const body = mesh.physicsBody;
      if (!body) continue;

      mesh.position.set(body.position.x, body.position.y, body.position.z);
      mesh.rotationQuaternion = mesh.rotationQuaternion || new BABYLON.Quaternion();
      mesh.rotationQuaternion.set(
        body.quaternion.x,
        body.quaternion.y,
        body.quaternion.z,
        body.quaternion.w
      );
    }

    scene.render();
  });
}

 rig.position = spawnPos.clone();

// GLOBAL pose variable (put this somewhere above your part() function)
let pose = 1; 
// 0 = idle, 1 = walk, 2 = jump


if (!rig) return;

function part(name, w, h, d, y, x = 0, color) {
    const p = BABYLON.MeshBuilder.CreateBox(name + "_" + (id++), {
        width: w, height: h, depth: d
    }, scene);

    p.position.y = y;
    p.position.x = x;

    mat.diffuseColor = color;
    mat.specularColor = new BABYLON.Color3(0.8, 0.8, 0.8);
    p.material = mat;

    p.parent = model;
    p.draggable = false;

    // ----------------------------------------------------
    // TEXTURE URLs
    // ----------------------------------------------------
    const studsURL = "https://raw.githubusercontent.com/yeahbuildsstuff/GameAssetServiceRepo/main/Surfaces/Studs2.0.png";
    const inletURL = "https://raw.githubusercontent.com/yeahbuildsstuff/GameAssetServiceRepo/main/Surfaces/Inlet2.0.png";

    // ----------------------------------------------------
    // ADD 1×1 FACE TEXTURE
    // ----------------------------------------------------
    function add1x1Texture(face, url, offsetX = 0) {
        const tex = new BABYLON.Texture(url, scene);
        tex.hasAlpha = true;

        const faceMat = new BABYLON.StandardMaterial(name + "_" + face + "_tex", scene);
        faceMat.diffuseTexture = tex;
        faceMat.opacityTexture = tex;
        faceMat.alpha = 0.3;
        faceMat.emissiveColor = new BABYLON.Color3(1, 1, 1);
        faceMat.specularColor = new BABYLON.Color3(0.9, 0.9, 0.9);
        faceMat.backFaceCulling = false;
        faceMat.zOffset = -2;

        const plane = BABYLON.MeshBuilder.CreatePlane(name + "_" + face + "_plane", {
            width: 1,
            height: 1
        }, scene);

        plane.material = faceMat;
        plane.parent = p;

        switch (face) {
            case "Top":
                plane.position.y = h / 2 + 0.001;
                plane.rotation.x = Math.PI / 2;
                plane.position.x += offsetX;
                break;

            case "Bottom":
                plane.position.y = -h / 2 - 0.001;
                plane.rotation.x = -Math.PI / 2;
                plane.position.x += offsetX;
                break;
        }
    }

    // ----------------------------------------------------
    // SPECIAL PART LOGIC (NO ANIMATION)
    // ----------------------------------------------------

    // ⭐ TORSO (T-shirt plane)
    if (name === "torso") {

        const plane = BABYLON.MeshBuilder.CreatePlane("TorsoFront2x2", {
            width: 2,
            height: 2
        }, scene);

        plane.parent = p;
        plane.position = new BABYLON.Vector3(0, 0, 0.506);
        plane.rotation = new BABYLON.Vector3(0, Math.PI, 0);

        const mat = new BABYLON.StandardMaterial("TorsoFrontMat", scene);
        mat.diffuseTexture = new BABYLON.Texture(
            tshirtTexture,
            scene
        );
        mat.diffuseTexture.hasAlpha = true;
        mat.backFaceCulling = false;

        plane.material = mat;

        /*add1x1Texture("Top", studsURL, -0.5);
        add1x1Texture("Top", studsURL,  0.5);*/

        add1x1Texture("Bottom", inletURL, -0.5);
        add1x1Texture("Bottom", inletURL,  0.5);
    }

    // ⭐ ARMS (pivot only)
    if (name === "leftArm" || name === "rightArm") {
        p.setPivotPoint(new BABYLON.Vector3(0, 0.5, 0));
        add1x1Texture("Top", studsURL);
        add1x1Texture("Bottom", inletURL);
    }

    // ⭐ LEGS (pivot only)
    if (name === "leftLeg" || name === "rightLeg") {
        p.setPivotPoint(new BABYLON.Vector3(0, 1, 0));
        add1x1Texture("Top", studsURL);
    }

    return p;
}


function rigReady() {
    // Rig root must exist
    if (!model) return false;

    // All limbs must exist
    if (!torso || !leftArm || !rightArm || !leftLeg || !rightLeg) return false;

    // All limbs must have rotation vectors
    if (!torso.rotation || !leftArm.rotation || !rightArm.rotation || !leftLeg.rotation || !rightLeg.rotation)
        return false;

    return true;
}

function waitForRigAndRotation(callback) {
    if (rigReady()) {
        callback();
    } else {
        // Try again next frame
        requestAnimationFrame(() => waitForRigAndRotation(callback));
    }
}



function animateRig() {
    // Wait until all limbs exist
    if (!leftArm || !rightArm || !leftLeg || !rightLeg || !torso) {
        requestAnimationFrame(animateRig);
        return;
    }

    if (!leftArm || !rightArm || !leftLeg || !rightLeg) return;

    // Stop old animations
    [leftArm, rightArm, leftLeg, rightLeg].forEach(l => scene.stopAnimation(l));

    // Helper: ping-pong tween (walk)
    function ping(mesh, from, to, duration = 500) {
        const anim = new BABYLON.Animation(
            "anim",
            "rotation.x",
            48,
            BABYLON.Animation.ANIMATIONTYPE_FLOAT,
            BABYLON.Animation.ANIMATIONLOOPMODE_CYCLE
        );

        anim.setKeys([
            { frame: 0,  value: from },
            { frame: 15, value: to },
            { frame: 30, value: from }
        ]);

        mesh.animations = [anim];
        scene.beginAnimation(mesh, 0, 30, true);
    }

    // Helper: tween to a single value (idle + jump)
    // ⭐ UPDATED: duration = 150ms (half of 300)
    function to(mesh, value, duration = 150) {
        const anim = new BABYLON.Animation(
            "animTo",
            "rotation.x",
            120,
            BABYLON.Animation.ANIMATIONTYPE_FLOAT,
            BABYLON.Animation.ANIMATIONLOOPMODE_CONSTANT
        );

        anim.setKeys([
            { frame: 0, value: mesh.rotation.x },
            { frame: 30, value: value }
        ]);

        mesh.animations = [anim];
        scene.beginAnimation(mesh, 0, 30, false);
    }

    // ----------------------------------------------------
    // POSE LOGIC
    // ----------------------------------------------------

    if (pose === 0) {
        // idle (now 150ms)
        to(leftArm, 0);
        to(rightArm, 0);
        to(leftLeg, 0);
        to(rightLeg, 0);
    }

    if (pose === 1) {
        // walk (unchanged)
        ping(leftArm,  Math.PI/4, -Math.PI/4);
        ping(rightArm, -Math.PI/4,  Math.PI/4);
        ping(leftLeg, -Math.PI/4,  Math.PI/4);
        ping(rightLeg, Math.PI/4, -Math.PI/4);
    }

// ======================================================
//  ONE FUNCTION TO RULE THEM ALL™
//  0.5 grid + size offset + Y lift + center snapping
// ======================================================
function snapPartPosition(pickPos, mesh) {
  const GRID = 0.5;

  const sx = mesh.scaling.x;
  const sy = mesh.scaling.y;
  const sz = mesh.scaling.z;

  const lifted = new BABYLON.Vector3(
    pickPos.x,
    pickPos.y + sy / 2,
    pickPos.z
  );

  const snap = (v, step) => Math.round(v / step) * step;

  return new BABYLON.Vector3(
    snap(lifted.x - sx/2, GRID) + sx/2,
    snap(lifted.y - sy/2, GRID) + sy/2,
    snap(lifted.z - sz/2, GRID) + sz/2
  );
}

  pointerDown(pick) {

    dragOffset = draggedMesh.position.subtract(pick.pickedPoint);

    if (draggedMesh.physicsBody) {
      draggedMesh.physicsBody.mass = 0;
      draggedMesh.physicsBody.updateMassProperties();
    }

    highlight.addMesh(draggedMesh, highlightColor);
  },

  pointerMove(pick) {
    if (!draggedMesh || !pick) return;

    const aligned = snapPartPosition(
      pick.pickedPoint.add(dragOffset),

    );

    draggedMesh.position.copyFrom(aligned);

    if (draggedMesh.physicsBody) {

function applyPhysicsGyro(body) {
    // If the body doesn't exist, just skip
    if (!body || !body.quaternion || !body.angularVelocity || !body.torque) {
        return;
    }

    // --- Gyro settings ---
    const gyroStrength = 45000;   // torque strength
    const gyroDamping  = 4;    // wobble resistance
    const maxTilt      = 0; // allowed tilt in radians

    // Convert quaternion to Euler for tilt measurement
    const e = body.quaternion.toEuler();

    // Limit tilt so the character doesn't fall over
    const targetX = Math.max(-maxTilt, Math.min(maxTilt, e.x));
    const targetZ = Math.max(-maxTilt, Math.min(maxTilt, e.z));

    // Compute tilt error
    const errorX = targetX - e.x;
    const errorZ = targetZ - e.z;

    // Compute corrective torque (spring physics)
    const torqueX = errorX * gyroStrength - body.angularVelocity.x * gyroDamping;
    const torqueZ = errorZ * gyroStrength - body.angularVelocity.z * gyroDamping;

    // Apply torque
    body.torque.x += torqueX;
    body.torque.z += torqueZ;
}
